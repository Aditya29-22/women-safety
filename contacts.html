<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts - Women Safety</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .input-field {
            width: 100%; padding: 0.75rem; margin-bottom: 1rem;
            border-radius: 0.5rem; border: 1px solid var(--glass-border);
            background: rgba(15, 23, 42, 0.5); color: white;
            font-size: 1rem;
        }
        .btn-add {
            width: 100%; padding: 0.75rem; background: var(--primary);
            color: white; border: none; border-radius: 0.5rem; font-weight: 600; cursor: pointer;
        }
        .contact-list { margin-top: 1rem; }
        .contact-item {
            background: rgba(255, 255, 255, 0.05); padding: 1rem; border-radius: 0.5rem;
            margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center;
        }
        .delete-btn {
            background: var(--danger); color: white; border: none; padding: 0.4rem 0.8rem;
            border-radius: 0.25rem; cursor: pointer; font-size: 0.75rem; font-weight: 600;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><span>🛡️</span> BeFree</div>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.875rem;">Home</a>
            <a href="dashboard.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.875rem;">Dashboard</a>
            <button id="logout-btn" style="background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 0.25rem 0.75rem; border-radius: 0.25rem; cursor: pointer; font-size: 0.75rem;">Logout</button>
        </div>
    </header>
    <main>
        <section class="card">
            <h2 class="card-title">Add Emergency Contact</h2>
            <div id="status-msg" style="margin-bottom: 1rem; font-size: 0.875rem;"></div>
            <input type="text" id="contact-name" class="input-field" placeholder="Contact Name">
            <input type="tel" id="contact-phone" class="input-field" placeholder="Phone Number">
            <button class="btn-add" id="add-btn">Save Contact</button>
        </section>

        <section class="card">
            <h2 class="card-title">Your Trusted Contacts</h2>
            <div class="contact-list" id="contact-list">
                <p style="color: var(--text-muted); font-size: 0.875rem;">Loading contacts...</p>
            </div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="contacts.js"></script>
</body>
</html>
