<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Women Safety</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .auth-container { text-align: center; }
        .input-field {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--glass-border);
            background: rgba(15, 23, 42, 0.5);
            color: white;
            font-size: 1rem;
        }
        .btn-auth {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 0.5rem;
            transition: opacity 0.2s;
        }
        .btn-auth:hover { opacity: 0.9; }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><span>🛡️</span> BeFree</div>
        <div class="status-badge">Authentication</div>
    </header>
    <main>
        <section class="card auth-container">
            <h2 class="card-title" style="justify-content: center; font-size: 1.25rem;">Secure Login</h2>
            <div id="auth-status" style="color: var(--danger); margin-bottom: 1rem; font-size: 0.875rem;"></div>
            <input type="email" id="email" class="input-field" placeholder="Email Address">
            <input type="password" id="password" class="input-field" placeholder="Password">
            <button class="btn-auth" id="login-btn">Log In</button>
            <button class="btn-auth btn-secondary" id="signup-btn">Sign Up</button>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
